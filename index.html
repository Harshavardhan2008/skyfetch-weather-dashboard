<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFetch - Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Axios for API calls -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>☁️ SkyFetch</h1>
        <p class="subtitle">Your personal weather companion</p>

        <!-- Search Section (NEW) -->
        <div class="search-section">
            <input type="text" id="city-input" placeholder="Enter city name..." value="London">
            <button id="search-btn">Search</button>
        </div>

        <!-- Weather Display -->
        <div class="weather-card">
            <h2 id="city">London</h2>
            
            <!-- Loading Spinner (hidden by default) -->
            <div id="loading-spinner" class="spinner hidden"></div>
            
            <!-- Error Message (hidden by default) -->
            <div id="error-message" class="error hidden"></div>
            
            <!-- Weather Content -->
            <div id="weather-content">
                <div class="weather-main">
                    <img id="weather-icon" src="" alt="Weather icon">
                    <div class="temp-container">
                        <span id="temperature">--</span>°C
                    </div>
                </div>
                <p id="description">Loading weather data...</p>
            </div>
        </div>

        <footer>
            <p>Data from OpenWeatherMap</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
